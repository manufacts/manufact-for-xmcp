version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Stay on the latest minor/patch of the framework (and other deps);
    # never auto-bump across a major.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
